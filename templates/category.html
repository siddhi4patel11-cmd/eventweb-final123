{% extends "base.html" %}
{% load static %}
{% block body %}
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.css"></script>
        <main>
          <div id="carouselExampleFade" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <div class="carousel-inner ">
              <div class="carousel-item active nav-category-header">
              <div class="container">
                <div class="row p-3 text-center ">
                  <div class="fs-2 fw-bold col-md-12 col-lg-12 col-sm-12 p-4">Exploring Your Events Here..</div>
                      <p class="col-md-12 col-sm-12 col-lg-12 text-center mt-1">────────────────</p>
                </div>
              </div>
              </div>
            </div>
          </div>
            <div class="container">
              <div class="row">
                {% for i in categories %}
                  <div class="col-md-4">
                    
                    <div class="col">
                      <a href="{% url 'subcategory' i.id %}">
                      <div class="card h-75 category-card">
                        {% if i.image %}
                        <img src="{{ i.image.url }}" class="card-img-top zoom-img-category" alt="Palm Springs Road" />
                        {% endif %}
                        <div class="card-body">
                          <h5 class="card-title fw-bold">{{i.name}}</h5>
                          <p class="card-text">{{i.descitem}}</p>
                          <!-- <p class="card-text">{{i.desc}}</p> -->
                        </div>
                      </div>
                      </a>
                    </div>
                    <!-- <a href="{% url 'subcategory' i.id %}">
                      <h2 class=" fs-2">{{i.name}}</h2>
                      <p class="">{{i.descitem}}</p>
                      {% if i.image %}
                        <img src="{{ i.image.url }}" width="200" height="200" class="card-img-top" alt="{{ category.name }}">
                      {% endif %}
                    </a> -->
                  </div> 
                {% endfor %}
              
            </div>
          </div>
        
        
          <!-- <figure class="figure category-img-figure ">
            <img src="media/{{i.image}}" class="img-fluid rounded" width="80%" alt="A figure image">
            <figcaption class="figure-caption  text-center">
              <h5 class="text-primary fs-4 text-dark">{{i.name}}</h5>
              <p class="mt-3">{{i.descitem}}</p>
            </figcaption>
          </figure> -->
          <div class="ticket-sec mt-5">
            <div class="container text-center">
                <div class="row">                                                 
                   <div class="container mt-5  ticket-sec1 p-4">
                    <div class="col-md-12 col-sm-12 col-lg-12 mt-5">
                      <div class="about-footer text-white">Get Ticket Now</div>
                    </div>
                    <div class="col-md-12 col-sm-12 col-lg-12 view-more">
                      <a href="#" class="bn13 p-3 mt-4">Buy Tickets ⤇</a>
                    </div>
                  </div>
                </div>
            </div>
          </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> 
</body>
</html>
{% endblock  %}
