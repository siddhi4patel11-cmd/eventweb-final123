<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <title>Registration</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css'%}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body>
    <main>
      <section class="vh-100 p-2 main-user-container">
        <div class="container h-custom">
          <div class="row d-flex justify-content-center align-items-center h-100 ">
            <div class="col-md-9 col-lg-6 col-xl-5 ">
              <div><img src="{% static 'image/num2.png'%}"  class="img-fluid" width="70%"></div>
            </div>
            <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1 col-sm-12 rounded  border border-secondary p-5">
              {% if messages %}
                  {% for message in messages %}
                      <div class="alert alert-danger">{{ message }}</div>
                  {% endfor %}
              {% endif %}
              <form method="post">
                {% csrf_token %}
                <!-- Email input -->
               
              <div class="form-group">
                  <label for="username">Username:</label>
                  <input type="text" id="username" name="username" class="form-control">
              </div>
              <div class="form-group">
                  <label for="password">Password:</label>
                  <input type="password" id="password" name="password" class="form-control">
              </div>
              <div class="form-group text-center">
                  <input type="submit" class="mt-5 btn btn-outline-dark  rounded-0 btn-sm mb-2" style="padding-left: 2.5rem; padding-right: 2.5rem;" value="Login" class="btn btn-primary">
              </div>

                <div class="d-flex justify-content-between align-items-center mb-0">
                  <!-- Checkbox -->
                  <div class="form-check">
                    <!-- <input class="form-check-input me-2 border-dark" type="checkbox" value="" id="form2Example3" /> -->
                    <!-- <label class="form-check-label" for="form2Example3">Remember me</label> -->
                  </div>
                  <!-- <a href="#!" class="text-body btn-sm">Forgot password?</a> -->
                </div>
                <div class="text-center text-lg-start mt-4 pt-2 ">
                  <!-- <button type="button" class=" btn btn-outline-dark  rounded-0 btn-sm mb-2" style="padding-left: 2.5rem; padding-right: 2.5rem;">Login</button> -->
                  <p class="small fw-bold mt-2 pt-1 mb-0">Don't have an account? <a href="user" >Register</a></p>
                </div>
              </form>
            </div>
          </div>
        </div>
        <div
          class="d-flex flex-column flex-md-row text-center text-md-start border border-dark justify-content-between py-4 px-4 px-xl-5 bg-white">
          <!-- Copyright -->
          <div class="text-dark  mb-md-0">
            Copyright © 2024. <a href="home" class="link-dark">EventBliss</a>
          </div>
          <div>
            <a href="home" class="text-dark me-4">
              <i class="fab fa-google"></i>
            </a>
          </div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  </body>
</html>
