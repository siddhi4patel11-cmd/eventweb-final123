{% extends "base.html" %}
{% load static %}
{% block body %}
      <main>
        <style>
          .card{
            flex-direction: row;
          }
        </style>
       
        <div id="carouselExampleFade" class="carousel slide carousel-fade" data-bs-ride="carousel">
          <div class="carousel-inner ">
            <div class="carousel-item active nav-category-header">
            <div class="container">
              <div class="row p-3 text-center ">
                
                <div class="fs-2 fw-bold col-md-12 col-lg-12 col-sm-12 text-center m-auto mt-4 "><h2>{{ subcategory.name }}</h2>
                </div>
                <!-- <div class="text-end fs-6 fw-bold text-center">{{subcategory.desc}}</div> -->
                    <p class="col-md-12 col-sm-12 col-lg-12 text-center mt-1">────────────────</p>
              </div>
            </div>
            </div>
          </div>
        </div> 
        <div class="container ">
					<div class="row">
						{% for i in event %}
						<div class="col-md-6 col-sm-12 col-lg-6 mt-5 ">
              <div class="container">
                <a href="{% url 'eventprofile' i.id %}">
                <div class="row card category-card">
                  <div class="col-4">
                      <img src="{{ i.image.url }}" class="img-fluid rounded-start" width="100%" alt="...">
                  </div>
                  <div class="col-6">
                    <div class="card-body">
                      <h5 class="card-title event-title mb-3">{{i.main_title}}</h5>
                      <div class="card-text p-1"><small >₹ : {{i.price}}</small></div>
                      <div class="card-text p-1"><small><strong>Date :</strong> {{i.date}}</small></div>
                      <div class="card-text p-1"><small ><strong>Location :</strong>{{i.location}}</small></div>
                      <div class="card-text p-1"><small class="text-muted">{{i.sub_category}}</small></div>
                      <!-- <p class="card-text p-1">{{i.caption}}</p> -->
                      <!-- <div class="p-1 mt-3"><a href="{% url 'eventprofile' i.id %}" class="bn13 btn border border-dark rounded-1">Book Now</a></div> -->
                    </div>

                  </div>
                </div>
                </a>
              </div>
              
						</div>
						{% endfor %}
					</div>
				</div>

        <div class="container">
          <div class="row">
            <div>
            </div>
            <!-- {% for i in event %}
            <div class="col-md-4 mt-4">
              <a href="{% url 'eventprofile' i.id %}">
              <div class="card" style="width: 20rem;">
                <div class="card-body">
                  <h5 class="card-title">{{i.name}}</h5>
                  <img src="{{ i.image.url }}" width="200" height="200" class="card-img-top" alt="{{ category.name }}">
                  <a href="#" class="btn btn-outline-dark btn-sm mt-5">view Events</a>
                </div>
              </div>
            </a>
            </div>
            {% endfor %} -->
          </div>
        </div>
        
        
        
        
      </main>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> 
   
{% endblock body %}
